<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Delete User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Delete User</h2>

    <div class="mb-3">
        <label>User ID</label>
        <input type="number" id="userId" class="form-control">
    </div>

    <button class="btn btn-danger" onclick="deleteUser()">Delete</button>

    <p id="result" class="mt-3"></p>
</div>

<script>
async function deleteUser() {
    const id = document.getElementById("userId").value;

    try {
        const response = await fetch(`http://localhost:5021/api/delete/${id}`, {
            method: "DELETE"
        });

        if (response.ok) {
            const text = await response.text();
            document.getElementById("result").innerText = "Good " + text;
        } else {
            document.getElementById("result").innerText = "Delete failed!";
        }

    } catch (error) {
        console.error(error);
        document.getElementById("result").innerText = "Error occurred";
    }
}
</script>

</body>
</html>
