<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Update User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Update User</h2>

    <div class="mb-3">
        <label>User ID</label>
        <input type="number" id="userId" class="form-control">
    </div>

    <div class="mb-3">
        <label>Name</label>
        <input type="text" id="name" class="form-control">
    </div>

    <div class="mb-3">
        <label>Age</label>
        <input type="number" id="age" class="form-control">
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input type="text" id="email" class="form-control">
    </div>

    <button class="btn btn-primary" onclick="updateUser()">Update</button>

    <p id="result" class="mt-3"></p>
</div>

<script>
async function updateUser() {
    const id = document.getElementById("userId").value;

    const user = {
        name: document.getElementById("name").value,
        age: parseInt(document.getElementById("age").value),
        email: document.getElementById("email").value
    };

    try {
        const response = await fetch(`http://localhost:5021/api/users/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(user)
        });

        if (response.ok) {
            document.getElementById("result").innerText = "User updated successfully!";
        } else {
            document.getElementById("result").innerText = "Update failed!";
        }

    } catch (error) {
        console.error(error);
        document.getElementById("result").innerText = "Error occurred";
    }
}
</script>

</body>
</html>
