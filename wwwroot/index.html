<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Users</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        margin: 0;
    }

    .sidebar {
        height: 100vh;
        width: 220px;
        position: fixed;
        top: 0;
        left: 0;
        background-color: #212529;
        padding-top: 20px;
    }

    .sidebar a {
        display: block;
        color: white;
        padding: 15px;
        text-decoration: none;
    }

    .sidebar a:hover {
        background-color: #495057;
    }

    .content {
        margin-left: 230px;
        padding: 20px;
    }
</style>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="index.html">🏠 Home</a>
    <a href="users.html">📋 Users</a>
    <a href="create.html">➕ Create</a>
    <a href="update.html">✏️ Update</a>
    <a href="delete.html">🗑️ Delete</a>
</div>


<div class="content">
    <h2>Users</h2>

    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Age</th>
            <th>Email</th>
        </tr>
        </thead>

        <tbody id="tbody_users_id"></tbody>
    </table>
</div>

<script>
async function loadUsers() {
    const url_server = `http://localhost:5021/api/users`;

    try {
        const response = await fetch(url_server);
        const users = await response.json();

        const tbody = document.getElementById('tbody_users_id');
        tbody.innerHTML = "";

        users.forEach(user => {
            const row = `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.name}</td>
                    <td>${user.age}</td>
                    <td>${user.email}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

    } catch (error) {
        console.error("Error loading users:", error);
    }
}

window.onload = loadUsers;
</script>

</body>
</html>
